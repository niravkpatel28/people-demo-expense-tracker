<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div>
          <p class="eyebrow">People Team</p>
          <h1>Expense Tracker</h1>
          <p class="app-subtitle" id="dateRange"></p>
        </div>
        <button class="btn-primary" id="openAddExpense" type="button">+ Add Expense</button>
      </header>

      <main class="dashboard" id="dashboard">
        <section class="card card--total" aria-labelledby="totalTitle">
          <p class="eyebrow" id="totalTitle">Total Expenses</p>
          <p class="metric" id="totalAmount">&nbsp;</p>
          <p class="metric-delta" id="totalDelta"></p>
          <button class="clear-filter" id="clearFilter" hidden>
            <span id="clearFilterLabel"></span> ✕
          </button>
        </section>

        <section class="card card--trend" aria-labelledby="trendTitle">
          <p class="eyebrow" id="trendTitle">Monthly Trend</p>
          <div class="chart-wrap" id="trendChart"></div>
        </section>

        <section class="card card--category" aria-labelledby="categoryTitle">
          <p class="eyebrow" id="categoryTitle">By Category</p>
          <div class="chart-wrap" id="categoryChart"></div>
        </section>

        <section class="card card--table" aria-labelledby="tableTitle">
          <p class="eyebrow" id="tableTitle">Recent Transactions</p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Expense</th>
                  <th>Category</th>
                  <th class="col-amount">Amount</th>
                </tr>
              </thead>
              <tbody id="transactionRows"></tbody>
            </table>
          </div>
        </section>
      </main>

      <p class="source-caption" id="sourceCaption">Source: backend/expenses.json</p>
    </div>

    <div class="modal-overlay" id="modalOverlay" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <h2 id="modalTitle">Add Expense</h2>
          <button class="modal-close" id="closeAddExpense" type="button" aria-label="Close">✕</button>
        </div>
        <form id="addExpenseForm">
          <label class="field">
            <span>Expense name</span>
            <input type="text" id="expenseName" required maxlength="80" placeholder="e.g. Grocery Shopping" />
          </label>

          <label class="field">
            <span>Amount (₹)</span>
            <input type="number" id="expenseAmount" required min="0.01" step="0.01" placeholder="0.00" />
          </label>

          <label class="field">
            <span>Category</span>
            <select id="expenseCategory" required></select>
          </label>

          <label class="field">
            <span>Date</span>
            <input type="date" id="expenseDate" required />
          </label>

          <p class="field-error" id="formError" hidden></p>

          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="cancelAddExpense">Cancel</button>
            <button type="submit" class="btn-primary">Save Expense</button>
          </div>
        </form>
      </div>
    </div>

    <script src="src/app.js"></script>
  </body>
</html>
